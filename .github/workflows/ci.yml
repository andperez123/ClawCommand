name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Typecheck dashboard
        run: npx tsc --noEmit
        working-directory: packages/dashboard

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clawcommand:latest .

      - name: Verify container starts
        run: |
          docker run -d --name test-api -p 4000:4000 -e CLAWCOMMAND_STORE=memory clawcommand:latest
          sleep 3
          curl -sf http://localhost:4000/health | grep -q '"ok":true'
          docker stop test-api
