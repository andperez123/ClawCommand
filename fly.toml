app = "clawcommand"
primary_region = "lax"

[build]

[env]
  NODE_ENV = "production"
  PORT = "4000"
  CLAWCOMMAND_DB_PATH = "/data/clawcommand.db"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "clawcommand_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[checks]
  [checks.health]
    type = "http"
    port = 4000
    path = "/health"
    interval = "30s"
    timeout = "5s"
