version: "3.8"

services:
  api:
    build: .
    ports:
      - "${PORT:-4000}:4000"
    volumes:
      - clawcommand-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CLAWCOMMAND_TOKENS=${CLAWCOMMAND_TOKENS:-}
      - CLAWCOMMAND_CORS_ORIGINS=${CLAWCOMMAND_CORS_ORIGINS:-}
      - CLAWCOMMAND_RATE_LIMIT=${CLAWCOMMAND_RATE_LIMIT:-120}
      - CLAWCOMMAND_DB_PATH=/app/data/clawcommand.db
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  clawcommand-data:
